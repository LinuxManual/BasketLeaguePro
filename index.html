<!DOCTYPE html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BasketLeague Pro 4.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=4.0.0" />
  </head>
  <body>
    <header class="topbar container"><a class="brand" href="#">🏀 BasketLeague Pro 4.0</a></header>
    <main class="container stack">
      <section class="hero card"><h1>MEGA UPGRADE</h1><p>Νέο dashboard + bets + rankings + export + φίλτρα.</p><div id="insights" class="hero-stats"></div></section>
      <section class="grid"><article class="card"><h2>Παίκτες</h2><form id="player-form"><select id="team"><option>HotHeroes</option><option>Ιπτάμενοι</option></select><input id="player" placeholder="Όνομα" required /><button>Προσθήκη</button></form><div class="cols"><div><h3>HotHeroes</h3><ul id="hot-list"></ul></div><div><h3>Ιπτάμενοι</h3><ul id="fly-list"></ul></div></div></article>
      <article class="card"><h2>Αγώνες</h2><form id="match-form"><input id="date" type="date" required/><input id="time" type="time" required/><input id="court" placeholder="Γήπεδο" required/><button>Δημιουργία</button></form><form id="score-form"><select id="match-id"></select><input id="hot" type="number" min="0" placeholder="Hot" required/><input id="fly" type="number" min="0" placeholder="Fly" required/><button>Σκορ</button></form></article></section>
      <section class="card"><h2>Πρόγραμμα</h2><input id="match-search" placeholder="Αναζήτηση γηπέδου"/><table><thead><tr><th>Ημ/νία</th><th>Ώρα</th><th>Γήπεδο</th><th>Σκορ</th><th>Status</th></tr></thead><tbody id="matches-body"></tbody></table></section>
      <section class="grid"><article class="card"><h2>Στοιχήματα</h2><form id="bet-form"><input id="bet-user" placeholder="Όνομα" required/><select id="bet-match-id"></select><input id="bet-hot" type="number" min="0" placeholder="Hot πρόβλεψη" required/><input id="bet-fly" type="number" min="0" placeholder="Fly πρόβλεψη" required/><input id="bet-stake" type="number" min="1" step="0.5" placeholder="Ποντάρισμα" required/><button>Καταχώρηση</button></form><table><thead><tr><th>Παίκτης</th><th>Ματς</th><th>Πρόβλεψη</th><th>Ποντ.</th><th>Result</th></tr></thead><tbody id="bets-body"></tbody></table></article>
      <article class="card"><h2>Chat + Export</h2><form id="chat-form"><input id="user" placeholder="Username" required/><textarea id="text" placeholder="Μήνυμα" required></textarea><button>Αποστολή</button></form><div class="actions"><button id="clear-chat" class="danger" type="button">Clear chat</button><button id="export-json" type="button">Export JSON</button></div><ul id="messages"></ul></article></section>
    </main>
    <script type="module" src="./script.js?v=4.0.0"></script>
  </body>
</html>
